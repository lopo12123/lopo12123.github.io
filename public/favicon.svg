<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="565" height="270" viewBox="0 0 565 270"
     stroke-linecap="round" stroke-width="20" fill="none"
     style="isolation: isolate">

    <!--
        - gap = 25
        - thickness = 20
        - radius = 60

        color scheme:
        - blue =  #333333
        - green = #333333
        - orange1 = #333333
        - orange2 = #333333
        - purple = #333333
        - red = #333333
        - yellow = #333333
    -->

    <!--  x = 35, l = 200  -->
    <g transform="translate(35, 135)" fill="#fff">
        <line x1="0" y1="-120" x2="0" y2="70" stroke="#333333"/>
        <!--        <line x1="0" y1="0" x2="0" y2="-120" stroke="#333333"/>-->
        <!--        <line x1="0" y1="0" x2="0" y2="70" stroke="#333333"/>-->
    </g>

    <!--  c = (140, 135), r = 60  -->
    <g transform="translate(140, 135)">
        <path d="M0,-60 A60,60 0 0 0 -60,0" stroke="#333333" style="mix-blend-mode: multiply"/>
        <path d="M60,0 A60,60 0 0 0 0,-60" stroke="#333333" style="mix-blend-mode: multiply"/>
        <path d="M0,60 A60,60 0 0 0 60,0" stroke="#333333" style="mix-blend-mode: multiply"/>
        <path d="M-60,0 A60,60 0 0 0 0,60" stroke="#333333" style="mix-blend-mode: multiply"/>
    </g>

    <!--  x = 245  -->
    <g transform="translate(245, 135)">
        <path d="M60,-60 A60,60 0 0 0 0,0" stroke="#333333" style="mix-blend-mode: multiply"/>
        <path d="M120,0 A60,60 0 0 0 60,-60" stroke="#333333" style="mix-blend-mode: multiply"/>
        <path d="M60,60 A60,60 0 0 0 120,0" stroke="#333333" style="mix-blend-mode: multiply"/>
        <path d="M0,0 A60,60 0 0 0 60,60" stroke="#333333" style="mix-blend-mode: multiply"/>

        <line x1="0" y1="0" x2="0" y2="-70" stroke="#333333" style="mix-blend-mode: multiply"/>
        <line x1="0" y1="0" x2="0" y2="120" stroke="#333333" style="mix-blend-mode: multiply"/>
    </g>

    <!--  c = (470, 135), r = 60  -->
    <g transform="translate(470, 135)">
        <path d="M0,-60 A60,60 0 0 0 -60,0" stroke="#333333" style="mix-blend-mode: multiply"/>
        <path d="M60,0 A60,60 0 0 0 0,-60" stroke="#333333" style="mix-blend-mode: multiply"/>
        <path d="M0,60 A60,60 0 0 0 60,0" stroke="#333333" style="mix-blend-mode: multiply"/>
        <path d="M-60,0 A60,60 0 0 0 0,60" stroke="#333333" style="mix-blend-mode: multiply"/>
    </g>
</svg>